server:
  listen: ":18808"
  timezone: "Asia/Shanghai"

web:
  auth_token: "change-this-to-a-random-token"

schedule:
  enabled: false
  interval_minutes: 360

job:
  concurrency: 6
  repeat: 1
  max_probe_candidates: 200
  tcp_precheck_timeout_seconds: 3
  probe_timeout_seconds: 8
  startup_timeout_seconds: 4

subscription:
  file: "./subscription_urls.txt"

probe:
  xray_bin: "../bin/xray-linux-64/xray"
  probe_url: "https://www.gstatic.com/generate_204"
  phase1_max_delay_ms: 1500
  phase2_max_delay_ms: 1000
  template:
    protocol: "vless"
    uuid: "replace-with-your-vless-uuid"
    password: ""
    security: "tls"
    transport: "ws"
    sni: "replace-with-your-sni.example.com"
    ws_host: "replace-with-your-host.example.com"
    ws_path: "/?ed=2048"

output:
  dir: "../runtime/outputs"
  name_prefix: "\u3010\u5468\u66f4\u00b7\u7092\u996d\u3011"

cache:
  history_file: "../runtime/cache/history_valid_nodes.txt"

publish:
  kv:
    enabled: true
    categories:
      "\u9999\u6e2f": 5
      "\u4e9a\u6d32": 5
      "\u6b27\u6d32": 5
      "\u7f8e\u6d32": 5
      "\u5176\u4ed6\u533a\u57df": 5
      "\u79fb\u52a8": 0
      "\u8054\u901a": 0
      "\u7535\u4fe1": 0
      "\u5b98\u65b9\u4f18\u9009": 0

  dns:
    enabled: true
    categories:
      "\u79fb\u52a8": 3
      "\u8054\u901a": 3
      "\u7535\u4fe1": 3
      "\u5b98\u65b9\u4f18\u9009": 3

cloudflare:
  worker:
    url: "https://your-worker.example.workers.dev"
    token: "replace-with-your-worker-token"
    key: "ip_asian"

  dns:
    api_token: "replace-with-your-cloudflare-api-token"
    zone_id: "replace-with-your-zone-id"
    "\u79fb\u52a8": "cmcc.example.com"
    "\u8054\u901a": "cu.example.com"
    "\u7535\u4fe1": "ct.example.com"
    "\u5b98\u65b9\u4f18\u9009": "official.example.com"